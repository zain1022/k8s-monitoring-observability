apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mini-api-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - mini-platform
  selector:
    matchLabels:
      app: mini-api
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
